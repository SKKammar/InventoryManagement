spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inventory_db_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Santosh}

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-super-secret-key-at-least-32-characters-long-for-hs512}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:7200000}

logging:
  level:
    root: INFO
    com.example.inventory: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG